<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Basketball Coaching Assistant | Tommy Sun</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #111;
      color: #f0f0f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1a1a;
      border-bottom: 3px solid #FF8C00;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    header h1 {
      font-family: Georgia, serif;
      font-size: 1.5rem;
      color: #FF8C00;
      letter-spacing: 0.03em;
    }

    header p {
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .back-link {
      color: #FF8C00;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1.5px solid #FF8C00;
      padding: 0.4rem 1rem;
      border-radius: 2px;
      transition: background 0.2s, color 0.2s;
    }
    .back-link:hover { background: #FF8C00; color: #111; }

    /* ── Main layout ── */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .intro {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .intro h2 {
      font-family: Georgia, serif;
      font-size: 2rem;
      color: #FF8C00;
      margin-bottom: 0.6rem;
    }

    .intro p {
      color: #aaa;
      font-size: 1rem;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── Form card ── */
    .form-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-top: 3px solid #FF8C00;
      border-radius: 4px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 1.2rem;
    }

    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #FF8C00;
    }

    select, textarea {
      background: #111;
      border: 1px solid #333;
      border-radius: 3px;
      color: #f0f0f0;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 0.95rem;
      padding: 0.65rem 0.8rem;
      transition: border-color 0.2s;
      width: 100%;
    }

    select:focus, textarea:focus {
      outline: none;
      border-color: #FF8C00;
    }

    select option { background: #1a1a1a; }

    .question-wrap { margin-bottom: 1.2rem; }

    textarea {
      resize: vertical;
      min-height: 110px;
      line-height: 1.6;
    }

    .ask-btn {
      width: 100%;
      background: #FF8C00;
      color: #111;
      border: none;
      border-radius: 3px;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .ask-btn:hover { background: #e07d00; }
    .ask-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Response area ── */
    .response-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-left: 4px solid #FF8C00;
      border-radius: 4px;
      padding: 2rem;
      display: none;
    }

    .response-card.visible { display: block; }

    .response-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #FF8C00;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .response-label .dot {
      width: 8px; height: 8px;
      background: #FF8C00;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
      display: none;
    }

    .response-label .dot.active { display: inline-block; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #response-text {
      color: #cccccc;
      font-size: 1rem;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    #response-text strong {
      color: #FF8C00;
      font-weight: 700;
    }

    /* ── Player summary badge ── */
    .player-badge {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    .badge {
      background: #222;
      border: 1px solid #333;
      color: #aaa;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
      border-radius: 2px;
    }

    /* ── Error ── */
    .error-msg {
      color: #ff6b6b;
      font-size: 0.9rem;
      margin-top: 0.8rem;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏀 Basketball Coaching Assistant</h1>
    <p>AI-powered advice tailored to your player</p>
  </div>
  <a href="basketball.html" class="back-link">← Back to Basketball Page</a>
</header>

<main>
  <div class="intro">
    <h2>Ask a Coaching Question</h2>
    <p>Tell me about your player and what you're working on. I'll give you specific, practical coaching advice tailored to their level, age, and position.</p>
  </div>

  <div class="form-card">
    <div class="form-grid">

      <div class="field-group">
        <label for="skill-level">Skill level</label>
        <select id="skill-level">
          <option value="">Select level…</option>
          <option value="beginner">Beginner — just starting out</option>
          <option value="recreational">Recreational — plays for fun</option>
          <option value="intermediate">Intermediate — understands the game</option>
          <option value="advanced">Advanced — competitive player</option>
          <option value="elite">Elite — high school varsity / AAU</option>
        </select>
      </div>

      <div class="field-group">
        <label for="age-group">Age group</label>
        <select id="age-group">
          <option value="">Select age…</option>
          <option value="5-7">5–7 years old</option>
          <option value="8-10">8–10 years old</option>
          <option value="11-13">11–13 years old</option>
          <option value="14-16">14–16 years old</option>
          <option value="17+">17+ / high school</option>
        </select>
      </div>

      <div class="field-group">
        <label for="position">Position</label>
        <select id="position">
          <option value="">Select position…</option>
          <option value="point guard">Point Guard</option>
          <option value="shooting guard">Shooting Guard</option>
          <option value="small forward">Small Forward</option>
          <option value="power forward">Power Forward</option>
          <option value="center">Center</option>
          <option value="not yet assigned">Not yet assigned</option>
        </select>
      </div>

      <div class="field-group">
        <label for="focus">Focus area</label>
        <select id="focus">
          <option value="">Select focus…</option>
          <option value="ball handling">Ball Handling</option>
          <option value="shooting">Shooting & Scoring</option>
          <option value="defense">Defense</option>
          <option value="passing">Passing & Court Vision</option>
          <option value="rebounding">Rebounding & Post Play</option>
          <option value="athleticism">Athleticism & Conditioning</option>
          <option value="mental game">Mental Game & Confidence</option>
          <option value="teamwork">Teamwork & Communication</option>
        </select>
      </div>

    </div>

    <div class="question-wrap">
      <label for="question">Your coaching question</label>
      <textarea
        id="question"
        placeholder="e.g. My player keeps losing their dribble under pressure. What drills can we do to fix this?"
      ></textarea>
    </div>

    <button class="ask-btn" id="ask-btn" onclick="askCoach()">Get Coaching Advice</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="response-card" id="response-card">
    <div class="response-label">
      <span class="dot" id="loading-dot"></span>
      <span id="response-label-text">Coaching advice</span>
    </div>
    <div class="player-badge" id="player-badge"></div>
    <div id="response-text"></div>
  </div>

</main>

<script>
  async function askCoach() {
    const level    = document.getElementById('skill-level').value;
    const age      = document.getElementById('age-group').value;
    const position = document.getElementById('position').value;
    const focus    = document.getElementById('focus').value;
    const question = document.getElementById('question').value.trim();

    const errorEl = document.getElementById('error-msg');
    errorEl.classList.remove('visible');

    if (!level || !age || !question) {
      errorEl.textContent = 'Please select a skill level, age group, and enter a question.';
      errorEl.classList.add('visible');
      return;
    }

    const btn = document.getElementById('ask-btn');
    const responseCard = document.getElementById('response-card');
    const responseText = document.getElementById('response-text');
    const loadingDot   = document.getElementById('loading-dot');
    const labelText    = document.getElementById('response-label-text');
    const badgeEl      = document.getElementById('player-badge');

    btn.disabled = true;
    btn.textContent = 'Getting advice…';
    responseCard.classList.add('visible');
    responseText.textContent = '';
    loadingDot.classList.add('active');
    labelText.textContent = 'Thinking…';

    // Build player badge
    badgeEl.innerHTML = [
      level && `<span class="badge">${level}</span>`,
      age   && `<span class="badge">Age ${age}</span>`,
      position && position !== '' ? `<span class="badge">${position}</span>` : '',
      focus && `<span class="badge">${focus}</span>`
    ].filter(Boolean).join('');

    const systemPrompt = `You are an expert youth basketball coach with years of experience coaching players from age 5 through high school varsity. You give specific, practical, encouraging coaching advice tailored to the player's skill level, age, and position. 

Format your response clearly with:
- A brief assessment of the situation
- 3-5 specific, actionable coaching tips or drills
- An encouraging closing note for the coach

Keep advice age-appropriate and realistic. Be warm, direct, and practical — like a mentor coach would be.`;

    const playerContext = [
      level    ? `Skill level: ${level}` : '',
      age      ? `Age group: ${age}` : '',
      position ? `Position: ${position}` : '',
      focus    ? `Focus area: ${focus}` : ''
    ].filter(Boolean).join('\n');

    const userMessage = `${playerContext}\n\nCoaching question: ${question}`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: userMessage }]
        })
      });

      const data = await response.json();

      if (data.error) {
        throw new Error(data.error.message);
      }

      const text = data.content.map(b => b.text || '').join('');
      loadingDot.classList.remove('active');
      labelText.textContent = 'Coaching advice';

      // Render with basic formatting
      responseText.innerHTML = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br/>');

    } catch (err) {
      loadingDot.classList.remove('active');
      labelText.textContent = 'Error';
      responseText.textContent = 'Something went wrong. Please try again.';
      console.error(err);
    }

    btn.disabled = false;
    btn.textContent = 'Get Coaching Advice';
  }
</script>

</body>
</html>
